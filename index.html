<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kanak 💖</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💖</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --pink: #ff5c8a;
    --pink-dark: #e8447a;
    --pink-soft: #ffd9e4;
    --cream: #fff7f9;
    --text: #5a2a3a;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(160deg, #ffe3ec 0%, #ffd0dd 45%, #ffc3d8 100%);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ---------- floating hearts background ---------- */
  .bg-heart {
    position: fixed;
    bottom: -10vh;
    font-size: 22px;
    opacity: 0;
    animation: floatUp linear infinite;
    pointer-events: none;
    z-index: 0;
    filter: saturate(1.2);
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
    10%  { opacity: .55; }
    90%  { opacity: .35; }
    100% { transform: translateY(-115vh) rotate(28deg) scale(1.25); opacity: 0; }
  }

  /* ---------- screens ---------- */
  .screen {
    position: relative;
    z-index: 2;
    width: min(92vw, 430px);
    text-align: center;
    display: none;
    animation: pop .55s cubic-bezier(.2,.9,.3,1.2);
  }
  .screen.active { display: block; }
  @keyframes pop {
    from { opacity: 0; transform: scale(.85) translateY(18px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .card {
    background: rgba(255,255,255,.82);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 28px;
    padding: 38px 26px 34px;
    box-shadow: 0 22px 55px rgba(232, 68, 122, .22);
    border: 1px solid rgba(255,255,255,.9);
  }

  .script { font-family: 'Dancing Script', cursive; }

  /* ---------- question screen ---------- */
  .beating-heart {
    font-size: 62px;
    display: inline-block;
    animation: beat 1.1s ease-in-out infinite;
  }
  @keyframes beat {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.18); }
    45% { transform: scale(1); }
    60% { transform: scale(1.12); }
  }

  #q-name {
    font-family: 'Dancing Script', cursive;
    font-size: 54px;
    color: var(--pink-dark);
    margin-top: 8px;
    line-height: 1;
  }
  #q-text {
    font-size: 23px;
    font-weight: 600;
    margin: 12px 0 30px;
    line-height: 1.35;
  }

  .btn-row {
    display: flex;
    gap: 18px;
    justify-content: center;
    align-items: center;
    min-height: 64px;
  }

  .btn {
    border: none;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 19px;
    padding: 14px 42px;
    border-radius: 999px;
    transition: transform .18s ease, box-shadow .18s ease;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  #yesBtn {
    background: linear-gradient(135deg, #ff7aa2, var(--pink-dark));
    color: #fff;
    box-shadow: 0 12px 26px rgba(232, 68, 122, .45);
    animation: glow 2s ease-in-out infinite;
  }
  #yesBtn:active { transform: scale(.94); }
  @keyframes glow {
    0%, 100% { box-shadow: 0 12px 26px rgba(232,68,122,.45); }
    50%      { box-shadow: 0 12px 38px rgba(232,68,122,.75); }
  }

  #noBtn {
    background: #fff;
    color: #b96e86;
    border: 2px solid #f3bccb;
    box-shadow: 0 8px 18px rgba(0,0,0,.06);
    padding: 12px 34px;
    font-size: 17px;
    white-space: nowrap;
  }
  #noBtn.fleeing {
    position: fixed;
    z-index: 50;
    margin: 0;
    transition: left .22s cubic-bezier(.2,.9,.3,1.3), top .22s cubic-bezier(.2,.9,.3,1.3);
  }

  #tease {
    min-height: 24px;
    margin-top: 22px;
    font-size: 15px;
    font-weight: 500;
    color: var(--pink-dark);
    opacity: .85;
  }

  /* ---------- calendar screen ---------- */
  #cal-title {
    font-family: 'Dancing Script', cursive;
    font-size: 42px;
    color: var(--pink-dark);
    line-height: 1.05;
  }
  #cal-sub { font-size: 15px; margin: 8px 0 20px; opacity: .8; }

  .cal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .cal-nav {
    border: none;
    background: var(--pink-soft);
    color: var(--pink-dark);
    width: 40px; height: 40px;
    border-radius: 50%;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s, opacity .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-nav:not(:disabled):active { transform: scale(.9); }
  .cal-nav:disabled { opacity: .3; cursor: default; }
  #cal-month { font-weight: 700; font-size: 18px; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }
  .dow {
    font-size: 12px;
    font-weight: 600;
    color: #c48ba0;
    padding: 6px 0;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .day {
    aspect-ratio: 1;
    border: none;
    background: transparent;
    border-radius: 14px;
    font-family: 'Poppins', sans-serif;
    font-size: 15.5px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    position: relative;
    transition: background .15s, transform .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .day:not(:disabled):hover { background: var(--pink-soft); }
  .day:not(:disabled):active { transform: scale(.88); }
  .day:disabled { color: #d9b6c2; opacity: .45; cursor: default; }
  .day.empty { visibility: hidden; }
  .day.today { box-shadow: inset 0 0 0 2px var(--pink); font-weight: 700; color: var(--pink-dark); }
  .day.today::after {
    content: '';
    position: absolute;
    bottom: 5px; left: 50%;
    transform: translateX(-50%);
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--pink);
  }
  .day.selected {
    background: linear-gradient(135deg, #ff7aa2, var(--pink-dark)) !important;
    color: #fff !important;
    font-weight: 700;
    box-shadow: 0 8px 18px rgba(232,68,122,.45);
  }

  /* ---------- confirm sheet ---------- */
  #confirmBar {
    margin-top: 18px;
    display: none;
    animation: pop .4s cubic-bezier(.2,.9,.3,1.2);
  }
  #confirmBar.show { display: block; }
  #confirmDateTxt { font-weight: 600; font-size: 16px; margin-bottom: 12px; }
  #bookBtn {
    width: 100%;
    background: linear-gradient(135deg, #ff7aa2, var(--pink-dark));
    color: #fff;
    box-shadow: 0 12px 26px rgba(232,68,122,.45);
    font-size: 18px;
    padding: 15px 20px;
  }
  #bookBtn:active { transform: scale(.97); }
  #bookBtn:disabled { opacity: .7; }

  /* ---------- booked screen ---------- */
  #booked .big {
    font-size: 74px;
    display: inline-block;
    animation: beat 1.1s ease-in-out infinite;
  }
  #booked h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 52px;
    color: var(--pink-dark);
    margin: 6px 0 4px;
    line-height: 1;
  }
  #bookedDate {
    display: inline-block;
    margin: 14px 0 6px;
    background: var(--pink-soft);
    color: var(--pink-dark);
    font-weight: 700;
    font-size: 18px;
    padding: 12px 24px;
    border-radius: 999px;
  }
  #booked p { font-size: 15.5px; line-height: 1.55; margin-top: 12px; }
  .ticket-line {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 2px dashed #f3bccb;
    font-size: 13.5px;
    opacity: .75;
  }

  /* confetti hearts */
  .confetti {
    position: fixed;
    z-index: 60;
    pointer-events: none;
    will-change: transform, opacity;
  }
</style>
</head>
<body>

  <!-- SCREEN 1 · the question -->
  <div class="screen active" id="ask">
    <div class="card">
      <span class="beating-heart">💖</span>
      <div id="q-name">Kanak,</div>
      <div id="q-text">will you go on a date with me?</div>
      <div class="btn-row">
        <button class="btn" id="yesBtn">Yes 💘</button>
        <button class="btn" id="noBtn" tabindex="-1">No</button>
      </div>
      <div id="tease"></div>
    </div>
  </div>

  <!-- SCREEN 2 · the calendar -->
  <div class="screen" id="cal">
    <div class="card">
      <div id="cal-title">Yayyy! 🎉</div>
      <div id="cal-sub">I knew it 😌 &nbsp;Now pick a day for our date…</div>
      <div class="cal-head">
        <button class="cal-nav" id="prevM" aria-label="Previous month">‹</button>
        <div id="cal-month"></div>
        <button class="cal-nav" id="nextM" aria-label="Next month">›</button>
      </div>
      <div class="cal-grid" id="grid"></div>
      <div id="confirmBar">
        <div id="confirmDateTxt"></div>
        <button class="btn" id="bookBtn">Book our date 💘</button>
      </div>
    </div>
  </div>

  <!-- SCREEN 3 · booked -->
  <div class="screen" id="booked">
    <div class="card">
      <span class="big">💝</span>
      <h1>It's booked!</h1>
      <div id="bookedDate"></div>
      <p>Our date is officially locked in.<br>Ghazi has been notified 💌 — he already can't wait.</p>
      <div class="ticket-line">admit two · dress code: your prettiest smile ✨</div>
    </div>
  </div>

<script>
(function () {
  'use strict';

  var EMAIL_ENDPOINT = 'https://formsubmit.co/ajax/m.ghaziraza651999@gmail.com';

  /* ================= floating hearts background ================= */
  var HEARTS = ['💖','💕','💗','🌸','💘','🩷'];
  for (var i = 0; i < 16; i++) {
    var h = document.createElement('div');
    h.className = 'bg-heart';
    h.textContent = HEARTS[i % HEARTS.length];
    h.style.left = (Math.random() * 96) + 'vw';
    h.style.fontSize = (14 + Math.random() * 22) + 'px';
    h.style.animationDuration = (9 + Math.random() * 10) + 's';
    h.style.animationDelay = (-Math.random() * 14) + 's';
    document.body.appendChild(h);
  }

  function show(id) {
    document.querySelectorAll('.screen').forEach(function (s) { s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  }

  /* ================= runaway NO button ================= */
  var noBtn = document.getElementById('noBtn');
  var yesBtn = document.getElementById('yesBtn');
  var tease = document.getElementById('tease');
  var escapes = 0;
  var TAUNTS = [
    'Nope, not clickable 😌',
    'Try again 😜',
    'Too slow! 🤭',
    'Nice try, Kanak 😏',
    'That button is shy 🙈',
    'The other one works great 👀',
    'Kanak… seriously? 😅',
    'It will literally never happen 💅',
    'Yes is right there 💖'
  ];

  function flee() {
    escapes++;
    var pad = 16;
    var bw = noBtn.offsetWidth, bh = noBtn.offsetHeight;
    if (!noBtn.classList.contains('fleeing')) {
      var r = noBtn.getBoundingClientRect();
      noBtn.classList.add('fleeing');
      noBtn.style.left = r.left + 'px';
      noBtn.style.top = r.top + 'px';
      // force layout so the transition animates from the current spot
      void noBtn.offsetWidth;
    }
    var maxX = window.innerWidth - bw - pad;
    var maxY = window.innerHeight - bh - pad;
    var x, y, tries = 0, yr = yesBtn.getBoundingClientRect();
    do {
      x = pad + Math.random() * Math.max(1, maxX - pad);
      y = pad + Math.random() * Math.max(1, maxY - pad);
      tries++;
    } while (tries < 25 && (
      // keep clear of the Yes button
      x < yr.right + 60 && x + bw > yr.left - 60 &&
      y < yr.bottom + 60 && y + bh > yr.top - 60
    ));
    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';

    noBtn.textContent = escapes < 3 ? 'No' : ['No 🏃‍♀️','Nope','No no no','Catch me!','😝'][Math.floor(Math.random()*5)];
    tease.textContent = TAUNTS[Math.min(escapes - 1, TAUNTS.length - 1)];

    // the Yes button grows a little every time No escapes
    var s = Math.min(1 + escapes * 0.05, 1.45);
    yesBtn.style.transform = 'scale(' + s + ')';
  }

  // desktop: run away as soon as the cursor gets close
  document.addEventListener('mousemove', function (e) {
    if (!document.getElementById('ask').classList.contains('active')) return;
    var r = noBtn.getBoundingClientRect();
    var R = 70;
    if (e.clientX > r.left - R && e.clientX < r.right + R &&
        e.clientY > r.top - R && e.clientY < r.bottom + R) flee();
  });
  // touch devices: escape the finger before the tap lands
  noBtn.addEventListener('touchstart', function (e) { e.preventDefault(); flee(); }, { passive: false });
  noBtn.addEventListener('pointerdown', function (e) { e.preventDefault(); flee(); });
  noBtn.addEventListener('click', function (e) { e.preventDefault(); flee(); }); // belt & braces
  window.addEventListener('resize', function () {
    if (noBtn.classList.contains('fleeing')) flee();
  });

  /* ================= YES → calendar ================= */
  yesBtn.addEventListener('click', function () {
    noBtn.style.display = 'none';
    burst(18);
    show('cal');
  });

  /* ================= calendar ================= */
  var today = new Date(); today.setHours(0, 0, 0, 0);
  var viewY = today.getFullYear(), viewM = today.getMonth();
  var MAX_AHEAD = 6; // months she can browse ahead
  var selected = null;

  var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var DOWS = ['Mo','Tu','We','Th','Fr','Sa','Su'];

  var grid = document.getElementById('grid');
  var monthLbl = document.getElementById('cal-month');
  var prevM = document.getElementById('prevM');
  var nextM = document.getElementById('nextM');
  var confirmBar = document.getElementById('confirmBar');
  var confirmTxt = document.getElementById('confirmDateTxt');
  var bookBtn = document.getElementById('bookBtn');

  function monthsFromNow(y, m) { return (y - today.getFullYear()) * 12 + (m - today.getMonth()); }

  function renderCal() {
    grid.innerHTML = '';
    monthLbl.textContent = MONTHS[viewM] + ' ' + viewY;
    prevM.disabled = monthsFromNow(viewY, viewM) <= 0;
    nextM.disabled = monthsFromNow(viewY, viewM) >= MAX_AHEAD;

    DOWS.forEach(function (d) {
      var el = document.createElement('div');
      el.className = 'dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    var first = new Date(viewY, viewM, 1);
    var lead = (first.getDay() + 6) % 7; // Monday-first
    for (var i = 0; i < lead; i++) {
      var pad = document.createElement('button');
      pad.className = 'day empty';
      pad.disabled = true;
      grid.appendChild(pad);
    }

    var days = new Date(viewY, viewM + 1, 0).getDate();
    for (var d = 1; d <= days; d++) {
      (function (d) {
        var date = new Date(viewY, viewM, d);
        var btn = document.createElement('button');
        btn.className = 'day';
        btn.textContent = d;
        if (date.getTime() === today.getTime()) btn.classList.add('today');
        if (selected && date.getTime() === selected.getTime()) btn.classList.add('selected');
        if (date < today) {
          btn.disabled = true;
        } else {
          btn.addEventListener('click', function () {
            selected = date;
            renderCal();
            confirmTxt.textContent = '💕 ' + fmt(date);
            confirmBar.classList.add('show');
          });
        }
        grid.appendChild(btn);
      })(d);
    }
  }

  function fmt(d) {
    return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }

  prevM.addEventListener('click', function () { if (--viewM < 0) { viewM = 11; viewY--; } renderCal(); });
  nextM.addEventListener('click', function () { if (++viewM > 11) { viewM = 0; viewY++; } renderCal(); });
  renderCal();

  /* ================= booking + email ================= */
  bookBtn.addEventListener('click', function () {
    if (!selected) return;
    bookBtn.disabled = true;
    bookBtn.textContent = 'Booking… 💌';
    var dateStr = fmt(selected);

    var finish = function () {
      document.getElementById('bookedDate').textContent = '📅 ' + dateStr;
      show('booked');
      burst(36);
      setTimeout(function () { burst(20); }, 700);
    };

    var payload = {
      _subject: '💖 Kanak said YES! Date booked: ' + dateStr,
      name: 'Kanak',
      answer: 'YES 💘',
      date_chosen: dateStr,
      message: 'Kanak said YES and booked your date for ' + dateStr + '. Time to plan something special!',
      _template: 'table',
      _captcha: 'false'
    };

    var done = false;
    var fallback = setTimeout(function () { if (!done) { done = true; finish(); } }, 4000);

    fetch(EMAIL_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(function () {}).finally(function () {
      clearTimeout(fallback);
      if (!done) { done = true; finish(); }
    });
  });

  /* ================= heart confetti ================= */
  function burst(n) {
    for (var i = 0; i < n; i++) {
      (function () {
        var c = document.createElement('div');
        c.className = 'confetti';
        c.textContent = HEARTS[Math.floor(Math.random() * HEARTS.length)];
        var startX = window.innerWidth / 2, startY = window.innerHeight / 2;
        c.style.left = startX + 'px';
        c.style.top = startY + 'px';
        c.style.fontSize = (14 + Math.random() * 20) + 'px';
        document.body.appendChild(c);
        var ang = Math.random() * Math.PI * 2;
        var v = 5 + Math.random() * 9;
        var vx = Math.cos(ang) * v, vy = Math.sin(ang) * v - 6;
        var x = 0, y = 0, o = 1, rot = 0, vr = (Math.random() - .5) * 14;
        var t = setInterval(function () {
          x += vx; y += vy; vy += 0.42; o -= 0.016; rot += vr;
          c.style.transform = 'translate(' + x + 'px,' + y + 'px) rotate(' + rot + 'deg)';
          c.style.opacity = Math.max(o, 0);
          if (o <= 0) { clearInterval(t); c.remove(); }
        }, 16);
      })();
    }
  }
})();
</script>
</body>
</html>
